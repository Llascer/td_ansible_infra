---
- name: Configuration des interfaces du CSR1000
  hosts: CSR1000
  gather_facts: no

  tasks:
    - name: Interfaces et descriptions
      cisco.ios.ios_interfaces:
        config:
          - name: GigabitEthernet1
            description: Interface WAN - DHCP
            enabled: true

          - name: GigabitEthernet2
            description: LAN Entreprise
            enabled: true

          - name: GigabitEthernet3
            description: LAN DMZ
            enabled: true

          - name: GigabitEthernet4
            description: LAN ADMIN
            enabled: true
        state: merged

    - name: IP des interfaces
      cisco.ios.ios_l3_interfaces:
        config:
          - name: GigabitEthernet1
            ipv4:
              - dhcp:
                  enable: true

          - name: GigabitEthernet2
            ipv4:
              - address: 192.168.2.1/24

          - name: GigabitEthernet3
            ipv4:
              - address: 192.168.3.1/24

          - name: GigabitEthernet4
            ipv4:
              - address: 192.168.4.1/24
        state: merged

    - name: Supprimer le pool DHCP s'il existe déjà
      cisco.ios.ios_config:
        lines:
          - no ip dhcp pool LAN_ENTREPRISE

    - name: Exclure l'adresse de l'interface
      cisco.ios.ios_config:
        lines:
          - ip dhcp excluded-address 192.168.2.1

    - name: Configurer le serveur DHCP pour LAN_ENTREPRISE
      cisco.ios.ios_config:
        parents: ip dhcp pool LAN_ENTREPRISE
        lines:
          - network 192.168.2.0 255.255.255.0
          - default-router 192.168.2.1
          - dns-server 8.8.8.8

    - name: Supprimer l'ancienne configuration PAT dynamique
      cisco.ios.ios_config:
        lines:
          - no ip nat inside source list 1 interface GigabitEthernet1 overload
          - no access-list 1
      ignore_errors: yes

    - name: Configurer l'interface WAN en NAT outside
      cisco.ios.ios_config:
        parents: interface GigabitEthernet1
        lines:
          - ip nat outside

    - name: Configurer les interfaces LAN en NAT inside
      cisco.ios.ios_config:
        parents: "interface {{ item }}"
        lines:
          - ip nat inside
      loop:
        - GigabitEthernet2
        - GigabitEthernet3
        - GigabitEthernet4

    - name: Créer l'ACL pour autoriser les réseaux internes
      cisco.ios.ios_config:
        lines:
          - access-list 1 permit 192.168.2.0 0.0.0.255
          - access-list 1 permit 192.168.3.0 0.0.0.255
          - access-list 1 permit 192.168.4.0 0.0.0.255

    - name: Activer le PAT dynamique
      cisco.ios.ios_config:
        lines:
          - ip nat inside source list 1 interface GigabitEthernet1 overload

    
    - name: Supprimer les anciennes redirections PAT par port
      cisco.ios.ios_config:
        lines:
          - no ip nat inside source static tcp 192.168.3.2 80 interface GigabitEthernet1 80
          - no ip nat inside source static tcp 192.168.4.2 22 interface GigabitEthernet1 2222
      ignore_errors: yes

    - name: Configurer le PAT par port pour le serveur web
      cisco.ios.ios_config:
        lines:
          - ip nat inside source static tcp 192.168.3.2 80 interface GigabitEthernet1 80

    - name: Configurer le PAT par port pour le serveur SSH
      cisco.ios.ios_config:
        lines:
          - ip nat inside source static tcp 192.168.4.2 22 interface GigabitEthernet1 2222